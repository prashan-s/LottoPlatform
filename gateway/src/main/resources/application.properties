spring.application.name=gateway
server.port=8080

# Management endpoints
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=DEBUG

# Gateway Routes
spring.cloud.gateway.mvc.routes[0].id=booking-service
spring.cloud.gateway.mvc.routes[0].uri=http://booking-service:8084
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/booking/**
spring.cloud.gateway.mvc.routes[0].filters[0]=AddRequestHeader=X-Gateway-Routed, true

spring.cloud.gateway.mvc.routes[1].id=payment-service
spring.cloud.gateway.mvc.routes[1].uri=http://payment-service:8082
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/payments/**
spring.cloud.gateway.mvc.routes[1].filters[0]=AddRequestHeader=X-Gateway-Routed, true

spring.cloud.gateway.mvc.routes[2].id=identity-members
spring.cloud.gateway.mvc.routes[2].uri=http://identity-service:8081
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/members/**
spring.cloud.gateway.mvc.routes[2].filters[0]=AddRequestHeader=X-Gateway-Routed, true

spring.cloud.gateway.mvc.routes[3].id=identity-profiles
spring.cloud.gateway.mvc.routes[3].uri=http://identity-service:8081
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/profiles/**
spring.cloud.gateway.mvc.routes[3].filters[0]=AddRequestHeader=X-Gateway-Routed, true

spring.cloud.gateway.mvc.routes[4].id=notification-service
spring.cloud.gateway.mvc.routes[4].uri=http://notification-service:8083
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/notifications/**
spring.cloud.gateway.mvc.routes[4].filters[0]=AddRequestHeader=X-Gateway-Routed, true
